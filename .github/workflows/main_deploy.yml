name: CI/CD Pipeline - BitSolucion

on:
  push:
    branches: [ "main", "feature/*", "fix/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publicar aplicación
      run: dotnet publish NotebookValidator.Web.csproj -c Release -o ./publish

    - name: Desplegar a IIS
      if: github.ref == 'refs/heads/main'
      shell: powershell
      run: |
        Import-Module WebAdministration
        $poolName = "bitsolucion"
        
        Write-Host "--- Iniciando despliegue en PRODUCCION ---"
        Stop-WebAppPool -Name $poolName -ErrorAction SilentlyContinue
        
        Start-Sleep -Seconds 5
        
        xcopy .\publish\* C:\inetpub\miapp\publish\ /E /H /C /I /Y
        
        Start-WebAppPool -Name $poolName -ErrorAction SilentlyContinue
        Write-Host "--- Despliegue completado ---"